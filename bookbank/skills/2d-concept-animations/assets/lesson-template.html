<!DOCTYPE html>
<!-- 2D Concept Animation lesson template.
     Replace: the concept framing, drawScene(), playLesson() beats, and the parameter.
     Implements: HiDPI canvas, promise tween, caption sync, legend chips,
     reduced-motion, lazy AudioContext pluck, resize, double-start guard. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Lesson Template</title>
<style>
  :root{
    --bg:#1a1a22; --panel:#252531; --line:#3a3a4a;
    --ink:#f0eff5; --dim:#9a99ac;
    --a:#e8b34b;   /* semantic color A (e.g. root / whole) */
    --b:#7fc9a6;   /* semantic color B (e.g. member / half) */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column}
  header{padding:16px 16px 10px}
  h1{font-size:18px;font-weight:700}
  header p{font-size:13px;color:var(--dim);margin-top:4px;line-height:1.5;max-width:60ch}
  header b{color:var(--a)}
  #controls{display:flex;gap:8px;flex-wrap:wrap;padding:8px 14px;align-items:center}
  select,button{font-size:14px;font-weight:600;border-radius:9px;padding:9px 14px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer}
  #playBtn{background:var(--a);color:#33260c;border:none}
  button:active{transform:translateY(1px)}
  select:focus-visible,button:focus-visible{outline:2px solid var(--b);outline-offset:2px}
  #wrap{padding:6px 8px 4px}
  canvas{display:block;width:100%;border-radius:12px;background:var(--panel)}
  #caption{text-align:center;padding:10px 16px 4px;min-height:52px}
  #stepLbl{font-size:24px;font-weight:800}
  #stepLbl.a{color:var(--a)} #stepLbl.b{color:var(--b)}
  #noteLbl{font-size:13px;color:var(--dim);margin-top:2px}
  #legend{display:flex;justify-content:center;gap:6px;padding:8px 12px 18px;flex-wrap:wrap}
  .chip{font-size:13px;font-weight:700;padding:6px 10px;border-radius:8px;
    background:var(--panel);border:1px solid var(--line);color:var(--dim);transition:all .2s}
  .chip.on{background:var(--a);color:#33260c;border-color:var(--a)}
</style>
</head>
<body>

<header>
  <h1>CONCEPT TITLE</h1>
  <p>Two–three sentences framing the concept. <b>Bold the key terms</b> using the
  same colors the animation uses.</p>
</header>

<div id="controls">
  <label for="param" style="font-size:12px;color:var(--dim)">Parameter</label>
  <select id="param"><option>Option 1</option><option>Option 2</option></select>
  <button id="playBtn">▶ Play</button>
  <button id="revealBtn">Show everything</button>
</div>

<div id="wrap"><canvas id="cv"></canvas></div>

<div id="caption">
  <div id="stepLbl">&nbsp;</div>
  <div id="noteLbl">Press play to begin.</div>
</div>

<div id="legend">
  <span class="chip" data-i="0">STEP 1</span>
  <span class="chip" data-i="1">STEP 2</span>
  <span class="chip" data-i="2">STEP 3</span>
</div>

<script>
(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const stepLbl = document.getElementById('stepLbl');
  const noteLbl = document.getElementById('noteLbl');
  const chips = [...document.querySelectorAll('.chip')];
  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- layout (HiDPI) ----------
  let W = 0, H = 0;
  function layout(){
    const dpr = Math.min(devicePixelRatio, 2);
    W = cv.clientWidth;
    H = Math.max(200, Math.min(300, W * 0.45));
    cv.style.height = H + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // >>> precompute geometry of the domain object here <<<
  }
  addEventListener('resize', () => { layout(); draw(); });

  // ---------- state ----------
  let marker = null;     // moving highlight, e.g. {x, y}
  let trail = [];        // landed/completed steps
  let animating = false;

  // ---------- drawing: full frame from state ----------
  function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
  function draw(){
    ctx.clearRect(0, 0, W, H);
    // >>> draw the domain object (axis / board / grid) <<<
    // >>> draw trail dots <<<
    for(const t of trail){
      ctx.beginPath(); ctx.arc(t.x, t.y, 11, 0, 7);
      ctx.fillStyle = t.primary ? css('--a') : css('--b'); ctx.fill();
    }
    // moving marker with glow
    if(marker){
      ctx.beginPath(); ctx.arc(marker.x, marker.y, 12, 0, 7);
      ctx.fillStyle = css('--a');
      ctx.shadowColor = css('--a'); ctx.shadowBlur = 16;
      ctx.fill(); ctx.shadowBlur = 0;
    }
  }

  // ---------- animation helpers ----------
  const wait = ms => new Promise(r => setTimeout(r, reducedMotion ? 40 : ms));
  function tween(dur, onFrame){
    return new Promise(res => {
      const t0 = performance.now();
      (function frame(now){
        const raw = Math.min(1, (now - t0) / (reducedMotion ? 1 : dur));
        onFrame(raw * raw * (3 - 2 * raw));   // smoothstep
        draw();
        raw < 1 ? requestAnimationFrame(frame) : res();
      })(t0);
    });
  }
  const lerp = (a, b, t) => a + (b - a) * t;

  function setCaption(big, small, cls){
    stepLbl.textContent = big || '\u00a0';
    stepLbl.className = cls || '';
    noteLbl.textContent = small || '';
  }

  // ---------- sound (lazy, gesture-created) ----------
  let ac = null;
  function pluck(midi){
    ac = ac || new (window.AudioContext || window.webkitAudioContext)();
    const f = 440 * Math.pow(2, (midi - 69) / 12), t = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + 1);
  }

  // ---------- the lesson ----------
  async function playLesson(){
    if(animating) return;
    animating = true;
    trail = []; chips.forEach(c => c.classList.remove('on'));

    // EXAMPLE beats — replace with the real lesson:
    marker = { x: 60, y: H / 2 };
    setCaption('Start', 'This is where the idea begins.', 'a');
    draw(); pluck(60);
    await wait(600);

    for(let i = 0; i < 3; i++){
      const fromX = marker.x, toX = fromX + (W - 120) / 3;
      chips[i] && chips[i].classList.add('on');
      setCaption('Step ' + (i + 1), 'Caption for what this beat demonstrates.', i % 2 ? 'b' : 'a');
      await tween(550, e => {
        marker.x = lerp(fromX, toX, e);
        marker.y = H / 2 - Math.sin(e * Math.PI) * 26;  // hop arc
      });
      marker.y = H / 2;
      trail.push({ x: marker.x, y: marker.y, primary: i === 2 });
      pluck(62 + i * 2);
      draw();
      await wait(500);
    }

    marker = null;
    setCaption(null, 'Takeaway: restate the concept in one sentence.');
    draw();
    animating = false;
  }

  function revealAll(){
    if(animating) return;
    // >>> populate trail with the complete picture, light all chips <<<
    chips.forEach(c => c.classList.add('on'));
    setCaption(null, 'The complete picture, all at once.');
    draw();
  }

  document.getElementById('playBtn').addEventListener('click', playLesson);
  document.getElementById('revealBtn').addEventListener('click', revealAll);
  document.getElementById('param').addEventListener('change', () => {
    if(animating) return;
    trail = []; marker = null; chips.forEach(c => c.classList.remove('on'));
    setCaption(null, 'Parameter changed — press play to see it with the new value.');
    draw();
  });

  layout(); draw();
})();
</script>
</body>
</html>
