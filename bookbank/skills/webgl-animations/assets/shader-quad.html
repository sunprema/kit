<!DOCTYPE html>
<!-- Minimal fullscreen-shader template: raw WebGL2, no dependencies.
     Replace the fragment shader body to build any 2D shader effect. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Shader Template</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  #fallback{color:#ccc;font:14px system-ui;padding:2rem;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fallback">WebGL2 is not available in this browser.</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) {
  canvas.remove();
  document.getElementById('fallback').style.display = 'block';
} else {
  main(gl);
}

function main(gl) {
  const vs = `#version 300 es
  void main() {
    // Fullscreen triangle from gl_VertexID — no vertex buffer needed.
    vec2 p = vec2((gl_VertexID << 1) & 2, gl_VertexID & 2);
    gl_Position = vec4(p * 2.0 - 1.0, 0.0, 1.0);
  }`;

  const fs = `#version 300 es
  precision highp float;
  uniform vec2 uResolution;
  uniform float uTime;
  out vec4 fragColor;

  // --- compact 2D simplex noise (public-domain style, Ian McEwan / Ashima) ---
  vec3 permute(vec3 x){ return mod(((x*34.0)+1.0)*x, 289.0); }
  float snoise(vec2 v){
    const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                        -0.577350269189626, 0.024390243902439);
    vec2 i = floor(v + dot(v, C.yy));
    vec2 x0 = v - i + dot(i, C.xx);
    vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
    vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
    i = mod(i, 289.0);
    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
    m = m*m; m = m*m;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 ox = floor(x + 0.5);
    vec3 a0 = x - ox;
    m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
    vec3 g;
    g.x = a0.x * x0.x + h.x * x0.y;
    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
    return 130.0 * dot(m, g);
  }
  // ---------------------------------------------------------------------------

  void main() {
    vec2 uv = gl_FragCoord.xy / uResolution;
    vec2 p = (gl_FragCoord.xy * 2.0 - uResolution) / uResolution.y;
    float t = mod(uTime, 3600.0);           // avoid float precision drift

    // EXAMPLE EFFECT — replace from here down.
    float n = snoise(p * 1.6 + vec2(t * 0.12, t * 0.07));
    n += 0.5 * snoise(p * 3.4 - vec2(t * 0.2, 0.0));
    vec3 col = mix(vec3(0.05, 0.08, 0.15), vec3(0.55, 0.75, 0.95), smoothstep(-0.6, 0.9, n));
    col += 0.08 * snoise(p * 12.0 + t);     // grain shimmer
    fragColor = vec4(col, 1.0);
  }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  const uRes = gl.getUniformLocation(prog, 'uResolution');
  const uTime = gl.getUniformLocation(prog, 'uTime');

  function resize() {
    const dpr = Math.min(devicePixelRatio, 2);
    const w = canvas.clientWidth * dpr, h = canvas.clientHeight * dpr;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }
  addEventListener('resize', resize);

  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let start = performance.now();
  function frame(now) {
    resize();
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, reducedMotion ? 0 : (now - start) / 1000);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
  }
  resize();
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
